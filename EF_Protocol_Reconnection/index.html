<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择语言 / Select Language</title>
    <link rel="icon" href="favicon.ico">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #222;
            background-image: 
                repeating-linear-gradient(0deg,
                    rgba(54, 54, 54, 0.4) 0px,
                    rgba(54, 54, 54, 0.4) 2px,
                    transparent 2px,
                    transparent 6px),
                url(assets/imgs/bg_mask.ac4131.png);
            background-position: 0% 0%, top;
            background-repeat: repeat, repeat-x;
            background-size: auto, auto 84.8148148148%;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(30, 30, 30, 0.85);
            border-radius: 18px;
            padding: 48px 40px 56px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(255, 241, 0, 0.1);
        }

        .header p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 3px;
            font-weight: 300;
        }

        .header .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff100, transparent);
            margin: 14px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 16px rgba(255, 241, 0, 0.15);
        }

        /* ===== 语言网格 ===== */
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        /* ===== 语言卡片 ===== */
        .lang-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            text-decoration: none;
            color: #e0e0e0;
            font-weight: 500;
            font-size: 16px;
            text-align: center;
            line-height: 1.4;
            min-height: 70px;
            transition: all 0.25s ease;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        .lang-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 241, 0, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 241, 0, 0.06), 0 2px 10px rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }

        .lang-card:active {
            transform: translateY(0px);
            box-shadow: 0 2px 12px rgba(255, 241, 0, 0.05);
        }

        .lang-card .code {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            padding: 0 10px;
            border-radius: 6px;
            margin-left: 8px;
            line-height: 22px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
        }

        .lang-card:hover .code {
            background: rgba(255, 241, 0, 0.12);
            color: #fff100;
            border-color: rgba(255, 241, 0, 0.2);
            box-shadow: 0 0 16px rgba(255, 241, 0, 0.05);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .container {
                padding: 32px 20px 40px;
                border-radius: 10px;
            }
            .header h1 {
                font-size: 26px;
            }
            .lang-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .lang-card {
                font-size: 14px;
                padding: 14px 10px;
                min-height: 60px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 32px;
                border-radius: 14px;
            }
            .header h1 {
                font-size: 22px;
            }
            .header p {
                font-size: 13px;
                letter-spacing: 1px;
            }
            .lang-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .lang-card {
                font-size: 13px;
                padding: 12px 8px;
                min-height: 54px;
                border-radius: 10px;
            }
            .lang-card .code {
                font-size: 10px;
                padding: 0 6px;
                line-height: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🌐 选择您的语言</h1>
            <p>SELECT YOUR PREFERRED LANGUAGE</p>
            <div class="divider"></div>
        </div>

        <div class="lang-grid" id="langGrid"></div>
    </div>

    <script>
        const LANGUAGES = {
            "en-us": "English",
            "zh-cn": "简体中文",
            "zh-tw": "繁體中文",
            "ja-jp": "日本語",
            "ko-kr": "한국어",
            "es-mx": "Español",
            "pt-br": "Português",
            "fr-fr": "Français",
            "de-de": "Deutsch",
            "ru-ru": "Русский",
            "it-it": "Italiano",
            "id-id": "Indonesia",
            "th-th": "ไทย",
            "vi-vn": "Tiếng Việt",
        };

        const TARGET_PAGE = "v1d0_01_returnback.html";
        const grid = document.getElementById("langGrid");

        for (const [code, displayName] of Object.entries(LANGUAGES)) {
            const card = document.createElement("a");
            card.className = "lang-card";
            card.href = `${TARGET_PAGE}?lang=${encodeURIComponent(code)}`;
            card.innerHTML = `${displayName} <span class="code">${code}</span>`;
            grid.appendChild(card);
        }
    </script>

</body>
</html>
