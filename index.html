<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择网页 / Select Website</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #222;
            background-image: 
                repeating-linear-gradient(0deg,
                    rgba(54, 54, 54, 0.4) 0px,
                    rgba(54, 54, 54, 0.4) 2px,
                    transparent 2px,
                    transparent 6px);
            background-position: 0% 0%;
            background-repeat: repeat;
            background-size: auto;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 640px;
            width: 100%;
            background: rgba(30, 30, 30, 0.85);
            border-radius: 18px;
            padding: 40px 36px 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(255, 241, 0, 0.1);
        }

        .header p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 3px;
            font-weight: 300;
        }

        .header .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff100, transparent);
            margin: 14px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 16px rgba(255, 241, 0, 0.15);
        }

        /* ===== 项目列表 ===== */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ===== 项目卡片 ===== */
        .project-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            text-decoration: none;
            color: #e0e0e0;
            font-weight: 500;
            font-size: 18px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            min-height: 64px;
        }

        .project-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 241, 0, 0.35);
            transform: translateX(4px);
            box-shadow: 0 8px 30px rgba(255, 241, 0, 0.06), 0 2px 10px rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }

        .project-card:active {
            transform: translateX(0px);
            box-shadow: 0 2px 12px rgba(255, 241, 0, 0.05);
        }

        /* 项目名称 */
        .project-card .label {
            flex: 1;
        }

        /* 小标签显示目录名 + 入口文件名 */
        .project-card .folder-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            padding: 0 14px;
            border-radius: 6px;
            line-height: 28px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
            flex-shrink: 0;
            margin-left: 16px;
        }

        .project-card:hover .folder-tag {
            background: rgba(255, 241, 0, 0.12);
            color: #fff100;
            border-color: rgba(255, 241, 0, 0.2);
            box-shadow: 0 0 16px rgba(255, 241, 0, 0.05);
        }

        /* 右箭头指示器 */
        .project-card .arrow {
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            margin-left: 12px;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .project-card:hover .arrow {
            color: rgba(255, 241, 0, 0.4);
            transform: translateX(4px);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .container {
                padding: 32px 20px 40px;
                border-radius: 10px;
            }
            .header h1 {
                font-size: 26px;
            }
            .project-card {
                font-size: 16px;
                padding: 16px 18px;
                min-height: 56px;
            }
            .project-card .folder-tag {
                font-size: 11px;
                padding: 0 10px;
                line-height: 24px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 32px;
                border-radius: 8px;
            }
            .header h1 {
                font-size: 22px;
            }
            .header p {
                font-size: 13px;
                letter-spacing: 1px;
            }
            .project-card {
                font-size: 14px;
                padding: 14px 14px;
                min-height: 50px;
                border-radius: 4px;
            }
            .project-card .folder-tag {
                font-size: 10px;
                padding: 0 8px;
                line-height: 20px;
                margin-left: 10px;
            }
            .project-card .arrow {
                font-size: 16px;
                margin-left: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>📁 选择网页</h1>
            <p>SELECT A WEBSITE</p>
            <div class="divider"></div>
        </div>

        <div class="project-list" id="projectList"></div>
    </div>

    <script>
        // ============================================================
        //  项目列表
        // ============================================================
        const PROJECTS = [
            { label: "终末地协议重连", folder: "EF_Protocol_Reconnection", entry: "index.html" },
        ];

        // ============================================================
        //  渲染项目卡片
        // ============================================================
        const list = document.getElementById("projectList");

        for (const proj of PROJECTS) {
            const card = document.createElement("a");
            card.className = "project-card";
            card.href = `./${proj.folder}/${proj.entry}`;
            card.innerHTML = `
                <span class="label">${proj.label}</span>
                <span class="folder-tag">${proj.folder}</span>
                <span class="arrow">›</span>
            `;
            list.appendChild(card);
        }
    </script>

</body>
</html>
