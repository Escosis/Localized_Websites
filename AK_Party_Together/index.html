<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择游戏</title>
    <link rel="icon" href="./party_together_1/favicon.ico">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --design-radius-sm: 0.375rem;
            --design-radius-md: 0.75rem;
            --design-radius-lg: 1.25rem;
            --design-radius-pill: 999rem;
            --design-shadow-sticker: 0.25rem 0.25rem 0 rgba(0, 0, 0, 0.18);
            --design-shadow-sticker-sm: 0.125rem 0.125rem 0 rgba(0, 0, 0, 0.14);
            --design-easing-out: cubic-bezier(0.34, 1.45, 0.64, 1);
            --design-duration-ui: 0.2s;
            --color-blue: #20a7ff;
            --color-blue-dark: #1a96e6;
            --color-blue-border: #d9f4ff;
            --color-blue-stripe: #54c9ff;
            --color-blue-stripe-bg: #6ad2ff;
            --color-orange: #ff9018;
            --color-orange-dark: #e68114;
            --color-orange-border: #fff8f0;
            --color-orange-stripe: #ffb606;
            --color-orange-stripe-bg: #ffc308;
            --color-text-dark: #2e2e2e;
            --color-text-muted: #6a6a6a;
            --color-white: #ffffff;
            --color-black: #000000;
        }

        html {
            touch-action: pan-x pan-y;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: none;
            -moz-text-size-adjust: none;
            -ms-text-size-adjust: none;
            text-size-adjust: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: 'SansBold', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', Ubuntu, Cantarell, 'Helvetica Neue', Oxygen, Open Sans, sans-serif;
            background: linear-gradient(135deg, #e8f8ff 0%, #c5edff 50%, #a8e0ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ========== 背景装饰 ========== */
        .bg-deco {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-deco .orb {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            filter: blur(60px);
            will-change: transform;
        }

        .bg-deco .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #60c4f8, transparent 70%);
            top: -150px;
            right: -100px;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }

        .bg-deco .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ffbc35, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: floatOrb 10s ease-in-out infinite alternate-reverse;
        }

        .bg-deco .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff6b6b, transparent 70%);
            top: 40%;
            left: 60%;
            animation: floatOrb 14s ease-in-out infinite alternate;
            opacity: 0.12;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(40px, -30px) scale(1.1);
            }
        }

        /* ========== 主容器 ========== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .title-wrap {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: titleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .title-wrap .title-img {
            display: block;
            max-width: 90%;
            height: auto;
            margin: 0 auto;
        }

        .title-wrap .title-img-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .title-wrap .title-img-group img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        @keyframes titleIn {
            0% {
                opacity: 0;
                transform: translateY(-2rem) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ========== 卡片网格 ========== */
        .card-grid {
            display: flex;
            gap: 3.5rem;
            width: 100%;
            max-width: 880px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        /* ========== 单个卡片 ========== */
        .card {
            flex: 1;
            min-width: 280px;
            max-width: 400px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            border-radius: var(--design-radius-lg);
            transition: transform var(--design-duration-ui) var(--design-easing-out),
                box-shadow var(--design-duration-ui) ease,
                filter var(--design-duration-ui) ease;
            will-change: transform;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active:not(.card-disabled) {
            transform: translateY(0.3rem) scale(0.97);
            transition-duration: 0.08s;
            transition-timing-function: ease-out;
        }

        .card .card-inner {
            position: relative;
            border-radius: var(--design-radius-lg);
            padding: 2.8rem 2rem 2.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100%;
            min-height: 340px;
            border: 0.25rem solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--design-shadow-sticker);
            overflow: hidden;
            transition: border-color var(--design-duration-ui) ease,
                box-shadow var(--design-duration-ui) ease,
                transform var(--design-duration-ui) var(--design-easing-out);
            flex: 1;
        }

        /* ---- 卡片：蓝色主题（此时欢宴） ---- */
        .card-blue .card-inner {
            background: linear-gradient(145deg, #f0faff, #d6f0ff);
            border-color: var(--color-blue-border);
            box-shadow: 0 0.25rem 1.5rem rgba(32, 167, 255, 0.15),
                var(--design-shadow-sticker);
        }

        .card-blue .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #20a7ff, #88d1ff);
            border-radius: var(--design-radius-lg) var(--design-radius-lg) 0 0;
        }

        .card-blue .card-inner .stripe-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: repeating-linear-gradient(-45deg,
                    rgba(84, 201, 255, 0.10) 0px,
                    rgba(84, 201, 255, 0.10) 0.375rem,
                    transparent 0.375rem,
                    transparent 0.875rem);
            pointer-events: none;
            border-radius: 0 0 var(--design-radius-lg) var(--design-radius-lg);
        }

        .card-blue .card-inner .icon-wrap {
            background: linear-gradient(135deg, #20a7ff, #60c4f8);
            box-shadow: 0 0.3rem 1rem rgba(32, 167, 255, 0.3);
        }

        .card-blue .card-inner .btn-enter {
            background: linear-gradient(135deg, #20a7ff, #4bb8ff);
            border-color: var(--color-blue-border);
            color: #fff;
        }

        .card-blue .card-inner .btn-enter::after {
            background: repeating-linear-gradient(-45deg,
                    #54c9ff 0px,
                    #54c9ff 0.375rem,
                    transparent 0.375rem,
                    transparent 0.875rem);
        }

        .card-blue:hover .card-inner {
            box-shadow: 0 0.5rem 2.5rem rgba(32, 167, 255, 0.25),
                0.25rem 0.35rem 0 rgba(0, 0, 0, 0.14);
            transform: translateY(-0.3rem);
        }

        /* ---- 卡片：橙色主题（此时庆会） ---- */
        .card-orange .card-inner {
            background: linear-gradient(145deg, #fffbf0, #fff3d6);
            border-color: var(--color-orange-border);
            box-shadow: 0 0.25rem 1.5rem rgba(255, 144, 24, 0.15),
                var(--design-shadow-sticker);
        }

        .card-orange .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #ff9018, #ffbc35);
            border-radius: var(--design-radius-lg) var(--design-radius-lg) 0 0;
        }

        .card-orange .card-inner .stripe-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: repeating-linear-gradient(-45deg,
                    rgba(255, 182, 6, 0.10) 0px,
                    rgba(255, 182, 6, 0.10) 0.375rem,
                    transparent 0.375rem,
                    transparent 0.875rem);
            pointer-events: none;
            border-radius: 0 0 var(--design-radius-lg) var(--design-radius-lg);
        }

        .card-orange .card-inner .icon-wrap {
            background: linear-gradient(135deg, #ff9018, #ffbc35);
            box-shadow: 0 0.3rem 1rem rgba(255, 144, 24, 0.3);
        }

        .card-orange .card-inner .btn-enter {
            background: linear-gradient(135deg, #ff9018, #ffaa3a);
            border-color: var(--color-orange-border);
            color: #fff;
        }

        .card-orange .card-inner .btn-enter::after {
            background: repeating-linear-gradient(-45deg,
                    #ffb606 0px,
                    #ffb606 0.375rem,
                    transparent 0.375rem,
                    transparent 0.875rem);
        }

        .card-orange:hover .card-inner {
            box-shadow: 0 0.5rem 2.5rem rgba(255, 144, 24, 0.25),
                0.25rem 0.35rem 0 rgba(0, 0, 0, 0.14);
            transform: translateY(-0.3rem);
        }

        /* ---- 卡片通用 ---- */
        .card .card-inner .icon-wrap {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #fff;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            margin-bottom: 1.2rem;
            transition: transform var(--design-duration-ui) var(--design-easing-out);
        }

        .card:hover .card-inner .icon-wrap {
            transform: scale(1.06) rotate(-4deg);
        }

        .card .card-inner .icon-wrap .icon-img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 0.15rem 0.3rem rgba(0, 0, 0, 0.15));
        }

        /* ---- 标题图片区域 ---- */
        .card .card-inner .title-images {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            position: relative;
            z-index: 1;
            margin-bottom: 0.5rem;
        }

        .card .card-inner .title-images img {
            display: block;
            max-width: 90%;
            height: auto;
            object-fit: contain;
        }

        /* ---- 卡片底部容器（分隔线 + 按钮） ---- */
        .card .card-inner .card-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            width: 100%;
            gap: 0.6rem;
            padding-top: 0.5rem;
        }
        .card .card-inner .card-footer .footer-title-img {
            display: block;
            max-width: 80%;
            height: auto;
            margin: 0 auto;
            flex-shrink: 0;
        }

        /* ---- 分隔线 ---- */
        .card .card-inner .card-divider {
            width: 3rem;
            height: 0.2rem;
            border-radius: var(--design-radius-pill);
            background: #d8d8d8;
            flex-shrink: 0;
            margin: 0;
        }

        .card-blue .card-inner .card-divider {
            background: linear-gradient(90deg, #20a7ff, #88d1ff);
        }
        .card-orange .card-inner .card-divider {
            background: linear-gradient(90deg, #ff9018, #ffbc35);
        }

        /* ---- 进入按钮（固定高度，无上下边距） ---- */
        .card .card-inner .btn-enter {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            width: auto;
            min-width: 8rem;
            height: 3.2rem;
            padding: 0 2rem;
            box-sizing: border-box;
            border-radius: var(--design-radius-pill);
            border: 0.2rem solid rgba(255, 255, 255, 0.6);
            font-size: 1.4rem;
            font-weight: 700;
            font-family: inherit;
            line-height: 1;
            cursor: pointer;
            transition: transform var(--design-duration-ui) var(--design-easing-out),
                        filter var(--design-duration-ui) ease,
                        box-shadow var(--design-duration-ui) ease;
            box-shadow: 0 0.15rem 0.6rem rgba(0, 0, 0, 0.08);
            margin: 0;
            overflow: hidden;
            text-decoration: none;
            color: #fff;
            letter-spacing: 0.04em;
        }

        /* 去除条纹背景 */
        .card .card-inner .stripe-bg {
            display: none;
        }

        /* 按钮悬停效果 */
        .card .card-inner .btn-enter:hover {
            transform: scale(1.04);
            filter: brightness(1.06);
        }

        .card .card-inner .btn-enter:active {
            transform: scale(0.94);
            filter: brightness(0.92);
            transition-duration: 0.08s;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .card-grid {
                gap: 2rem;
            }
            .card {
                min-width: 240px;
                max-width: 100%;
                flex: 1 1 100%;
            }
            .card .card-inner {
                min-height: 280px;
                padding: 2rem 1.5rem 1.8rem;
            }
            .card .card-inner .icon-wrap {
                width: 5rem;
                height: 5rem;
                font-size: 2.4rem;
            }
            .card .card-inner .title-images img {
                max-width: 80%;
            }
            .card .card-inner .btn-enter {
                height: 2.8rem;
                font-size: 1.1rem;
                min-width: 6rem;
                padding: 0 1.5rem;
            }
            .card .card-inner .card-footer {
                gap: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .title-wrap {
                margin-bottom: 2rem;
            }
            .card .card-inner {
                min-height: 240px;
                padding: 1.5rem 1rem 1.5rem;
            }
            .card .card-inner .icon-wrap {
                width: 4rem;
                height: 4rem;
                font-size: 2rem;
                margin-bottom: 0.8rem;
            }
            .card .card-inner .title-images img {
                max-width: 75%;
            }
            .card .card-inner .btn-enter {
                height: 2.4rem;
                font-size: 0.95rem;
                min-width: 5rem;
                padding: 0 1rem;
            }
            .card .card-inner .card-footer {
                gap: 0.4rem;
            }
        }

        /* ========== 页脚 ========== */
        .footer {
            margin-top: 3rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            opacity: 0.5;
            text-align: center;
            letter-spacing: 0.06em;
            font-weight: 400;
        }

        .footer a {
            color: var(--color-text-muted);
            text-decoration: none;
        }

        /* ========== 工具类 ========== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
